services:
  - type: web
    name: resume-builder-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        scope: secret
      - key: JWT_SECRET
        scope: secret

  - type: static
    name: resume-builder-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: ${SERVICES.0.RENDER_EXTERNAL_URL}
